background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 8
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgba(255,255,255,1.0)
    font_size = 90
    font_family = JetBrainsMono Nerd Font
    position = 0, 220
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 300, 55

    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true

    outer_color = rgba(255,255,255,0.2)
    inner_color = rgba(0,0,0,0.4)
    font_color = rgb(255,255,255)

    fade_on_empty = false
    rounding = 12

    placeholder_text = Password...
    position = 0, -80
    halign = center
    valign = center
}
